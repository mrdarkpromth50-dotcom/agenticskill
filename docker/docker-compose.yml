version: '3.8'

services:
  # Antigravity Proxy for LLM access
  antigravity-proxy:
    image: node:20-slim
    container_name: antigravity-claude-proxy
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
    command: bash -c "npm install -g antigravity-claude-proxy@latest && antigravity-claude-proxy start"
    volumes:
      - antigravity-data:/root/.antigravity
    networks:
      - agentic-network
    restart: unless-stopped

  # OpenClaw Gateway
  openclaw:
    image: node:24-slim
    container_name: openclaw-gateway
    ports:
      - "18789:18789"
    environment:
      - NODE_ENV=production
      - OPENCLAW_PORT=18789
    command: bash -c "npm install -g openclaw@latest && openclaw gateway --port 18789"
    volumes:
      - openclaw-data:/root/.openclaw
      - ./config/openclaw-template.json:/root/.openclaw/openclaw.json
    networks:
      - agentic-network
    depends_on:
      - antigravity-proxy
    restart: unless-stopped

  # Agent Town UI
  agent-town:
    image: node:20-slim
    container_name: agentic-agent-town-ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GATEWAY_URL=ws://openclaw:18789
    command: bash -c "npx @geezerrrr/agent-town --port 3000 --gateway ws://openclaw:18789/"
    networks:
      - agentic-network
    depends_on:
      - openclaw
    restart: unless-stopped

  # Redis for Short-term and Shared Memory
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    ports:
      - "6379:6379"
    networks:
      - agentic-network
    restart: unless-stopped

  # ChromaDB for Long-term Memory (Vector DB)
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: agentic-chromadb
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
    networks:
      - agentic-network
    restart: unless-stopped

  # Ollama for local LLM (optional, for translation layer or other LLM services)
  ollama:
    image: ollama/ollama
    container_name: agentic-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agentic-network
    restart: unless-stopped

  # Memory System Service
  memory-system:
    build:
      context: ../services/memory-system
      dockerfile: Dockerfile
    container_name: agentic-memory-system
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=${REDIS_URL}
      - VECTOR_DB_URL=${VECTOR_DB_URL}
      - VECTOR_DB_TYPE=${VECTOR_DB_TYPE}
      - PORT=${MEMORY_SYSTEM_PORT}
    networks:
      - agentic-network
    depends_on:
      - redis
      - chromadb
    restart: unless-stopped

  # Persistent Agent Layer Service
  persistent-agent-layer:
    build:
      context: ../services/persistent-agent-layer
      dockerfile: Dockerfile
    container_name: agentic-persistent-agent-layer
    ports:
      - "3002:3002"
    environment:
      - PERSISTENT_AGENT_HEARTBEAT_INTERVAL=${PERSISTENT_AGENT_HEARTBEAT_INTERVAL}
      - PERSISTENT_AGENT_AUTO_RESTART=${PERSISTENT_AGENT_AUTO_RESTART}
      - PORT=${PERSISTENT_AGENT_LAYER_PORT}
    networks:
      - agentic-network
    depends_on:
      - redis
      - chromadb
      - openclaw
    restart: unless-stopped

  # Spawn Manager Service
  spawn-manager:
    build:
      context: ../services/spawn-manager
      dockerfile: Dockerfile
    container_name: agentic-spawn-manager
    ports:
      - "3003:3003"
    environment:
      - SPAWN_MAX_CONCURRENT=${SPAWN_MAX_CONCURRENT}
      - SPAWN_TASK_TIMEOUT=${SPAWN_TASK_TIMEOUT}
      - AGENT_CONFIG_DIR=/app/config/agents # Assuming config is mounted or copied
      - PORT=${SPAWN_MANAGER_PORT}
    networks:
      - agentic-network
    depends_on:
      - redis
      - chromadb # If agent configs are loaded from memory system
      - openclaw
    restart: unless-stopped

  # Spawn-on-Demand Agent Templates Service
  spawn-agents:
    build:
      context: ../services/spawn-agents
      dockerfile: Dockerfile
    container_name: agentic-spawn-agents
    ports:
      - "3007:3007"
    environment:
      - ANTIGRAVITY_PROXY_URL=${ANTIGRAVITY_PROXY_URL}
      - SPAWN_MANAGER_URL=${SPAWN_MANAGER_URL}
      - PORT=${SPAWN_AGENTS_PORT}
    networks:
      - agentic-network
    depends_on:
      - antigravity-proxy
      - spawn-manager
    restart: unless-stopped

  # Translation Layer Service
  translation-layer:
    build:
      context: ../services/translation-layer
      dockerfile: Dockerfile
    container_name: agentic-translation-layer
    ports:
      - "3005:3005"
    environment:
      - TRANSLATION_API_URL=${TRANSLATION_API_URL}
      - TRANSLATION_MODEL=${TRANSLATION_MODEL}
      - PORT=${TRANSLATION_LAYER_PORT}
    networks:
      - agentic-network
    depends_on:
      - ollama # If using Ollama for translation
    restart: unless-stopped

  # Account Manager Service
  account-manager:
    build:
      context: ../services/account-manager
      dockerfile: Dockerfile
    container_name: agentic-account-manager
    ports:
      - "3006:3006"
    environment:
      - ACCOUNT_ROTATION_INTERVAL=${ACCOUNT_ROTATION_INTERVAL}
      - LLM_ACCOUNT_HEALTH_CHECK_INTERVAL=${LLM_ACCOUNT_HEALTH_CHECK_INTERVAL}
      - PORT=${ACCOUNT_MANAGER_PORT}
    networks:
      - agentic-network
    restart: unless-stopped

  # CEO Agent Service
  ceo-agent:
    build:
      context: ../services/ceo-agent
      dockerfile: Dockerfile
    container_name: agentic-ceo-agent
    ports:
      - "3004:3004"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - MEMORY_SYSTEM_URL=${MEMORY_SYSTEM_URL}
      - SPAWN_MANAGER_URL=${SPAWN_MANAGER_URL}
      - TRANSLATION_LAYER_URL=${TRANSLATION_LAYER_URL}
      - ACCOUNT_MANAGER_URL=${ACCOUNT_MANAGER_URL}
      - ANTIGRAVITY_PROXY_URL=${ANTIGRAVITY_PROXY_URL} # Added for TaskPlanner
      - PORT=${CEO_AGENT_PORT}
    networks:
      - agentic-network
    depends_on:
      - memory-system
      - persistent-agent-layer
      - spawn-manager
      - translation-layer
      - account-manager
      - antigravity-proxy # Added dependency
      - openclaw # CEO might use openclaw for internal communication or monitoring
    restart: unless-stopped

  # Discord Bot Service (existing)
  discord-bot:
    build:
      context: ../services/discord-bot
      dockerfile: Dockerfile
    container_name: agentic-discord-bot
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
    networks:
      - agentic-network
    depends_on:
      - openclaw
    restart: unless-stopped

  # Telegram Bot Service (existing)
  telegram-bot:
    build:
      context: ../services/telegram-bot
      dockerfile: Dockerfile
    container_name: agentic-telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    networks:
      - agentic-network
    depends_on:
      - openclaw
    restart: unless-stopped

volumes:
  antigravity-data:
  openclaw-data:
  ollama_data:

networks:
  agentic-network:
    driver: bridge
